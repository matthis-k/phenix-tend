name: Retire repository

on:
  pull_request:

permissions:
  contents: write

jobs:
  retire:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - name: Replace active implementation with a history-only tombstone
        shell: bash
        run: |
          set -euo pipefail
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cat > README.md <<'EOF'
          # Retired repository

          This repository has no active implementation. Its previous contents remain available through Git history.

          Repository quality gates now live with each project and are composed from devenv tasks, treefmt, git-hooks.nix, and flake checks.
          EOF
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: retire the standalone implementation"
          git push origin main
